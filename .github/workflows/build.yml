name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Restore Keystore and Environment Files
        run: |
          echo "Checking repository files..."
          ls -la
          if [ -f debug.keystore.base64 ]; then
            echo "Found debug.keystore.base64, decoding to debug.keystore..."
            base64 --decode debug.keystore.base64 > debug.keystore
            if [ -f debug.keystore ]; then
              echo "Successfully decoded debug.keystore. Size: $(wc -c < debug.keystore) bytes"
            else
              echo "Error: debug.keystore file was not created!"
            fi
          else
            echo "Error: debug.keystore.base64 not found in the root directory!"
          fi
          if [ -f .env.example ]; then
            cp .env.example .env
            echo ".env restored from .env.example"
          fi

      - name: Restore Gradle Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Save Gradle Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
